name: Security pre-extraction checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-extraction-security:
    name: Secrets and forbidden files scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Check forbidden tracked files
        shell: bash
        run: |
          set -euo pipefail

          forbidden_regex='(^|/)\.env(\..*)?$|(^|/)[^/]*\.env(\..*)?$|(^|/).*\.(dump|sql|sqlite|sqlite3|db|log|csv|tsv|parquet|pkl|pickle|joblib|onnx|pt|pth|h5|hdf5|npy|npz)$|(^|/)(dump|dumps|dataset|datasets|data|logs|artifacts|artefacts|models?)(/|$)|(^|/)\.DS_Store$'

          if git ls-files -z | grep -zE "$forbidden_regex" > /tmp/forbidden-files; then
            echo "Forbidden tracked files detected. Remove them from Git before extraction."
            tr '\0' '\n' < /tmp/forbidden-files
            exit 1
          fi

          echo "No forbidden tracked files detected."
